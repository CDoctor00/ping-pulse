services:
  rabbitmq:
    image: rabbitmq:3-management
    container_name: pingpulse_rabbitmq
    restart: unless-stopped
    ports:
      - "10000:5672"
      - "10001:15672"
    networks:
      - pingpulse_network
    # environment:
    #   RABBITMQ_DEFAULT_USER: user
    #   RABBITMQ_DEFAULT_PASS: password

  database:
    image: postgres:18.1-alpine3.23
    container_name: pingpulse_db
    restart: unless-stopped
    ports:
      - "10002:5432"
    env_file: ".env"
    environment:
      POSTGRES_USER: "${DB_USER}"
      POSTGRES_PASSWORD: "${DB_PASSWORD}"
      POSTGRES_DB: "${DB_NAME}"
    networks:
      - pingpulse_network
    volumes:
      - db_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER} -d ${DB_NAME}"]
      start_period: 5s
      interval: 5s
      timeout: 5s
      retries: 5

  migrator:
    build:
      context: ./migrator
      dockerfile: Dockerfile
    container_name: pingpulse_migrator
    restart: no
    env_file: "./migrator/.env"
    networks:
      - pingpulse_network
    depends_on:
      database:
        condition: service_healthy

  db-maintenance:
    build:
      context: ./db-maintenance
      dockerfile: Dockerfile
    container_name: pingpulse_db_maintenance
    restart: unless-stopped
    env_file: ".env"
    environment:
      TZ: "Europe/Rome"
      PGPASSWORD: "${DB_PASSWORD}"
      BACKUP_RETENTION_DAYS: "30"
      BACKUP_MAX_COUNT: "50"
    networks:
      - pingpulse_network
    volumes:
      - ./backups:/backups
    depends_on:
      migrator:
        condition: service_completed_successfully

  pinger:
    build:
      context: ./services/pinger
      dockerfile: Dockerfile
    container_name: pingpulse_pinger
    restart: unless-stopped
    env_file: "./services/pinger/.env"
    environment:
      TZ: "Europe/Rome"
    networks:
      - pingpulse_network
    depends_on:
      migrator:
        condition: service_completed_successfully

  server:
    build:
      context: ./services/server
      dockerfile: Dockerfile
    container_name: pingpulse_server
    restart: unless-stopped
    env_file: "./services/server/.env"
    environment:
      TZ: "Europe/Rome"
    networks:
      - pingpulse_network
    ports:
      - "10003:7000"
    depends_on:
      migrator:
        condition: service_completed_successfully

  notifier:
    build:
      context: ./services/notifier
      dockerfile: Dockerfile
    container_name: pingpulse_notifier
    restart: unless-stopped
    env_file: "./services/notifier/.env"
    environment:
      TZ: "Europe/Rome"
    networks:
      - pingpulse_network
    depends_on:
      migrator:
        condition: service_completed_successfully

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: pingpulse_frontend
    restart: unless-stopped
    env_file: "./frontend/.env"
    environment:
      TZ: "Europe/Rome"
    networks:
      - pingpulse_network
    ports:
      - "4173:4173"
    depends_on:
      migrator:
        condition: service_completed_successfully

volumes:
  db_data:

networks:
  pingpulse_network:
    driver: bridge
